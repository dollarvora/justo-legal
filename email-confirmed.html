<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - Justo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #FFFFFF;
      background: #121212;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .site-nav {
      background: #1A1A1A;
      border-bottom: 1px solid #2A2A2A;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .nav-brand {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-brand span { color: #1B5E20; }

    /* Main content */
    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(76, 175, 80, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .checkmark svg {
      width: 36px;
      height: 36px;
      stroke: #4CAF50;
      stroke-width: 3;
      fill: none;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #B0B0B0;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #1B5E20;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      margin-bottom: 20px;
      transition: background 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn:hover { background: #2E7D32; }
    .fallback {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    /* Footer */
    .site-footer {
      background: #1A1A1A;
      border-top: 1px solid #2A2A2A;
      padding: 24px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }
    .site-footer a {
      color: #4CAF50;
      text-decoration: none;
    }
    .site-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 36px 20px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="https://justosafety.app/" class="nav-brand">Justo<span>.</span></a>
  </nav>

  <div class="container">
    <div class="card">
      <div class="checkmark">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Email Confirmed!</h1>
      <p class="subtitle">Your email has been verified successfully. You can now sign in to your Justo account.</p>
      <a href="justo://auth/callback" class="btn" id="openApp">Open Justo App</a>
      <p class="fallback">If you're on a different device, open the Justo app on your phone and sign in with your email and password.</p>
    </div>
  </div>

  <footer class="site-footer">
    &copy; 2025 Justo &middot; <a href="https://justosafety.app/">Legal</a> &middot; <a href="mailto:support@justosafety.app">Contact</a>
  </footer>

  <script>
    // Auto-attempt to open the app via deep link after a short delay
    setTimeout(function() {
      window.location.href = 'justo://auth/callback';
    }, 500);
  </script>
</body>
</html>
